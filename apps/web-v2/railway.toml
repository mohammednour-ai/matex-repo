# Include shared monorepo paths so changes outside apps/web-v2 still trigger deploys.
[build]
watchPatterns = [
  "apps/web-v2/**",
  "packages/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "tsconfig.json",
]

# Deploy / runtime — Railway needs an explicit healthcheck path that returns 2xx
# without a redirect. The root `/` is a redirect to `/login`, which some Railway
# probes treat as unhealthy and the deploy stays in "completed but not online".
[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
