# Railway service config for `matex-web`.
#
# REQUIRED dashboard settings for this file to take effect (Railway services
# default Config-as-Code Path to `/railway.toml`, which belongs to the gateway):
#   matex-web → Settings → Config-as-Code File: apps/web-v2/railway.toml
#   matex-web → Settings → Source → Root Directory: <empty>  (i.e. monorepo root)
#
# Root Directory MUST be the monorepo root because apps/web-v2/Dockerfile copies
# pnpm-workspace.yaml + packages/shared/* from the parent. Scoping the build
# context to apps/web-v2/ would make the Docker build fail at COPY.
#
# Without an explicit builder Railway falls back to Nixpacks, which guesses a
# pnpm workspace filter that doesn't match `@matex/web-v2` and fails the deploy
# with `No projects matched the filters in /app` (Next.js never starts).
[build]
builder = "DOCKERFILE"
# Path is relative to the Root Directory (monorepo root), NOT to this toml file.
dockerfilePath = "apps/web-v2/Dockerfile"
watchPatterns = [
  "apps/web-v2/**",
  "packages/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "tsconfig.json",
]

# Deploy / runtime — Railway needs an explicit healthcheck path that returns 2xx
# without a redirect. The root `/` is a redirect to `/login`, which some Railway
# probes treat as unhealthy and the deploy stays in "completed but not online".
[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
