name: Database — Apply Migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "apply" to confirm'
        required: true
        default: ''
      supabase_access_token:
        description: 'Supabase Access Token (sbp_...)'
        required: true
        default: ''
      supabase_project_ref:
        description: 'Supabase Project Ref'
        required: true
        default: ''
      supabase_db_password:
        description: 'Supabase DB Password'
        required: true
        default: ''

jobs:
  migrate:
    name: Apply Supabase Migrations
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'apply'
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.22.6/supabase_linux_amd64.tar.gz \
            -o /tmp/supabase.tar.gz
          tar -xzf /tmp/supabase.tar.gz -C /usr/local/bin/ supabase
          supabase --version

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ github.event.inputs.supabase_access_token }}
        run: |
          supabase link \
            --project-ref "${{ github.event.inputs.supabase_project_ref }}" \
            --password "${{ github.event.inputs.supabase_db_password }}"

      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ github.event.inputs.supabase_access_token }}
        run: |
          supabase db push \
            --password "${{ github.event.inputs.supabase_db_password }}"

      - name: Confirm
        run: echo "✅ Migrations applied to project ${{ github.event.inputs.supabase_project_ref }}"
