name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "8"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Type Check (web-v2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # No workspace package defines a `typecheck` script today; the real
      # checker is `tsc --noEmit` per project. web-v2 is the only TS
      # surface that benefits from a recursive type pass — MCP servers
      # build via tsc as part of `prepare`, so a tsc-clean install equals
      # a tsc-clean repo for those.
      - run: pnpm --filter @matex/web-v2 exec tsc --noEmit -p tsconfig.json

  test:
    name: Unit Tests (vitest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build (web-v2)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @matex/web-v2 build

  smoke-tests:
    name: Smoke Tests (DB)
    runs-on: ubuntu-latest
    needs: test
    # Skips when STAGING_DATABASE_URL is not configured (forks, fresh repos).
    # The phase-N scripts talk to a real Postgres instance and are useless
    # without one — a missing secret used to fail the whole pipeline.
    if: ${{ vars.RUN_SMOKE_TESTS == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run Phase 1 smoke
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm smoke:phase1
      - name: Run Phase 2 smoke
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm smoke:phase2
      - name: Run Phase 3 smoke
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm smoke:phase3
      - name: Run Phase 4 smoke
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm smoke:phase4

  e2e-happy-path:
    name: Web E2E Happy Path
    runs-on: ubuntu-latest
    needs: build
    # Same skip pattern — the suite needs the full dev stack (gateway +
    # adapters + Supabase) and that's not available on forks or branches
    # without a staging environment.
    if: ${{ vars.RUN_E2E == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @matex/web-v2 exec playwright install --with-deps chromium
      - run: pnpm --filter @matex/web-v2 test:e2e

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Deploy MCP Servers to Railway (Staging)
        run: echo "TODO: Deploy to Railway staging"
      - name: Deploy Web to Vercel (Preview)
        run: echo "TODO: Vercel preview deployment"
      - name: Staging Health Check
        env:
          HEALTHCHECK_URL: ${{ secrets.STAGING_HEALTHCHECK_URL || 'http://localhost:3001/health' }}
        run: pnpm healthcheck

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Deploy MCP Servers to Railway (Production)
        run: echo "TODO: Deploy to Railway production"
      - name: Deploy Web to Vercel (Production)
        run: echo "TODO: Vercel production deployment"
      - name: Health Check
        env:
          HEALTHCHECK_URL: ${{ secrets.PRODUCTION_HEALTHCHECK_URL || 'http://localhost:3001/health' }}
        run: pnpm healthcheck
      - name: Rollback Guard
        if: failure()
        run: |
          echo "Deployment failed health checks. Rollback required."
          echo "TODO: Trigger Railway + Vercel rollback automation."
          exit 1
