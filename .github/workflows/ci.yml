name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "8"

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run Phase 1 smoke
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm smoke:phase1
      - name: Run Phase 2 smoke
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm smoke:phase2
      - name: Run Phase 3 smoke
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm smoke:phase3
      - name: Run Phase 4 smoke
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm smoke:phase4

  e2e-happy-path:
    name: Web E2E Happy Path
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @matex/web-v2 exec playwright install --with-deps chromium
      - run: pnpm --filter @matex/web-v2 test:e2e

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, smoke-tests, e2e-happy-path]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Deploy MCP Servers to Railway (Staging)
        run: echo "TODO: Deploy to Railway staging"
      - name: Deploy Web to Vercel (Preview)
        run: echo "TODO: Vercel preview deployment"
      - name: Staging Health Check
        env:
          HEALTHCHECK_URL: ${{ secrets.STAGING_HEALTHCHECK_URL || 'http://localhost:3001/health' }}
        run: pnpm healthcheck

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, smoke-tests, e2e-happy-path]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Deploy MCP Servers to Railway (Production)
        run: echo "TODO: Deploy to Railway production"
      - name: Deploy Web to Vercel (Production)
        run: echo "TODO: Vercel production deployment"
      - name: Health Check
        env:
          HEALTHCHECK_URL: ${{ secrets.PRODUCTION_HEALTHCHECK_URL || 'http://localhost:3001/health' }}
        run: pnpm healthcheck
      - name: Rollback Guard
        if: failure()
        run: |
          echo "Deployment failed health checks. Rollback required."
          echo "TODO: Trigger Railway + Vercel rollback automation."
          exit 1
